<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PORT SCANNER</title>

<style>

/* =========================
CYBER THEME
========================= */

:root{
--green:#00ff9c;
--blue:#00d9ff;
--red:#ff3c3c;
--bg:#04060b;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Consolas,monospace;
overflow:hidden;
}

/* MATRIX BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* MAIN PANEL */

.container{
width:950px;
margin:auto;
margin-top:60px;
background:rgba(10,15,20,0.85);
padding:30px;
border-radius:10px;
box-shadow:0 0 40px #00ff9c33;
backdrop-filter:blur(8px);
}

h1{
text-align:center;
color:var(--green);
text-shadow:0 0 20px var(--green);
}

/* INPUT */

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

input{
background:black;
border:1px solid var(--green);
padding:10px;
color:var(--green);
width:300px;
}

button{
background:transparent;
border:1px solid var(--blue);
color:var(--blue);
padding:10px 20px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 12px var(--blue);
}

/* TERMINAL */

#terminal{
margin-top:20px;
height:80px;
color:var(--green);
}

/* PROGRESS */

.progress{
height:12px;
background:#111;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--green),var(--blue));
transition:width .3s;
}

/* PORT GRID */

#ports{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

/* PORT CARD */

.port{
background:#111;
padding:10px;
border-radius:6px;
border:1px solid #222;
display:flex;
justify-content:space-between;
}

/* STATES */

.scanning{
color:var(--blue);
animation:blink 1s infinite;
}

.open{
border-color:var(--green);
color:var(--green);
box-shadow:0 0 10px var(--green);
}

.closed{
border-color:var(--red);
color:var(--red);
box-shadow:0 0 10px var(--red);
}

/* SUMMARY */

#summary{
text-align:center;
font-size:18px;
margin-top:20px;
}

@keyframes blink{
50%{opacity:0}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1> PORT SCANNER</h1>

<div class="controls">
<input id="ip" placeholder="Enter Target IP">
<button onclick="startScan()">START SCAN</button>
</div>

<div id="terminal"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="ports"></div>

<div id="summary"></div>

</div>

<script>

/* =========================
MATRIX BACKGROUND
========================= */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01ABCDEFGHIJKLMNOPQRSTUVWXYZ"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let i=0;i<columns;i++) drops[i]=1

function drawMatrix(){

ctx.fillStyle="rgba(4,6,11,0.1)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff9c"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(drawMatrix,40)

/* =========================
COMMON PORT LIST
========================= */

const portsList=[
21,22,23,25,53,67,68,69,80,110,
119,123,137,138,139,143,161,179,
389,443,445,465,500,587,636,
989,990,993,995,1433,1521,
2049,2082,2083,2181,2483,
2484,3000,3306,3389,3690,
4444,4664,4899,5000,5432,
5601,5631,5900,5985,6379,
6667,7001,7002,7777,8000,
8008,8080,8081,8443,8888
]

/* =========================
TERMINAL
========================= */

function log(text){

document.getElementById("terminal").innerHTML=text

}

/* =========================
SCAN
========================= */

function startScan(){

let ip=document.getElementById("ip").value

if(!ip){
alert("Enter IP Address")
return
}

document.getElementById("ports").innerHTML=""
document.getElementById("summary").innerHTML=""
document.getElementById("bar").style.width="0%"

log("Connecting to host...")

setTimeout(()=>log("Bypassing firewall..."),800)
setTimeout(()=>log("Establishing handshake..."),1500)
setTimeout(()=>log("Scanning ports..."),2200)

let shuffled=[...portsList].sort(()=>Math.random()-0.5).slice(0,15)

let open=0
let closed=0
let i=0

let scan=setInterval(()=>{

let port=shuffled[i]

let div=document.createElement("div")
div.className="port scanning"

div.innerHTML=`PORT ${port} <span>SCANNING...</span>`

document.getElementById("ports").appendChild(div)

setTimeout(()=>{

let isOpen=Math.random()>0.65

if(isOpen){

div.classList.remove("scanning")
div.classList.add("open")
div.innerHTML=`PORT ${port} 🔓 OPEN`
open++

}else{

div.classList.remove("scanning")
div.classList.add("closed")
div.innerHTML=`PORT ${port} 🔒 CLOSED`
closed++

}

},700)

i++

document.getElementById("bar").style.width=(i/shuffled.length*100)+"%"

if(i>=shuffled.length){

clearInterval(scan)

setTimeout(()=>{

document.getElementById("summary").innerHTML=
`SCAN COMPLETE → 🟢 ${open} OPEN | 🔴 ${closed} CLOSED`

},1000)

}

},1000)

}

</script>

</body>
</html>
